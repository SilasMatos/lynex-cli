server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    absolute_redirect off;

    # Tratar acesso direto à página /auth/ no browser
    # Serve o index.html da SPA, assim como outras rotas de front
    location = /auth/ {
        try_files /index.html =404;
    }

    # Proxy auth routes to the API (same-origin para chamadas via fetch)
    # /auth/* continua indo para a API normalmente
    location /auth/ {
        proxy_pass http://api:3000/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Do not intercept redirects - let the browser follow them
        proxy_redirect off;
    }

    # Proxy workspace/bookmark API routes
    location = /workspaces {
        return 308 /workspaces/;
    }

    location /workspaces/ {
        proxy_pass http://api:3000/workspaces/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
